services:
  database:
    container_name: manage_teams_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: manage_teams
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d manage_teams"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    container_name: manage_teams_adminer
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
      ADMINER_DEFAULT_DRIVER: pgsql
      ADMINER_DEFAULT_DB: manage_teams
    depends_on:
      database:
        condition: service_healthy

volumes:
  db_data:
